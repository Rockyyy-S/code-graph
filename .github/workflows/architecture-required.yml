name: architecture-required

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  architecture-required:
    name: architecture-required
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm unit

      - name: Build
        run: pnpm build

      - name: Repository contracts
        run: pnpm contract

      - name: Dependency boundaries
        run: pnpm dependency-boundary

      - name: Basic security
        run: pnpm basic-security
