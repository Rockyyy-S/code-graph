name: child-gate-evidence

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write

jobs:
  gate-evidence:
    name: gate-evidence
    uses: Rockyyy-S/code-graph-gate-controller/.github/workflows/produce-gate-evidence.yml@7625ab3c58d6e0fd4d6b16e577609ab96b127870
    with:
      base_oid: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      head_oid: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      object_format: sha1
      provider_repository_id: ${{ format('{0}', github.event.repository.id) }}
      producer_workflow_sha: 7625ab3c58d6e0fd4d6b16e577609ab96b127870
      repository: ${{ github.repository }}
